<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Grabado Láser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f4f4f4; }
        .container { max-width:1300px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        h1 { text-align:center; color:#333; }
        .tabs { display:flex; gap:10px; justify-content:center; margin:20px 0; }
        .tab { padding:12px 25px; background:#eee; border:none; border-radius:8px 8px 0 0; cursor:pointer; }
        .tab.active { background:#007bff; color:white; }
        .main { display:flex; gap:25px; flex-wrap:wrap; }
        .canvas-wrapper { text-align:center; }
        button, input, select { margin:5px 0; padding:10px; border-radius:5px; }
        button { background:#007bff; color:white; border:none; cursor:pointer; }
        button:hover { background:#0056b3; }
        .controls { min-width:280px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Personalizador de Grabado Láser</h1>

        <div class="tabs">
            <button class="tab active" onclick="switchTab(0)">Frente</button>
            <button class="tab" onclick="switchTab(1)">Dorso</button>
        </div>

        <div class="main">
            <div class="canvas-wrapper">
                <canvas id="canvas" width="550" height="550" style="border:2px solid #ccc; border-radius:8px;"></canvas>
            </div>

            <div class="controls">
                <h3>Producto</h3>
                <select id="productSelect" onchange="loadMockup()">
                    <option value="medalla-redonda">Medalla Redonda</option>
                    <option value="medalla-ovalada">Medalla Ovalada</option>
                    <option value="mate-acero">Mate de Acero</option>
                </select>

                <h3>Subir Imagen/Logo</h3>
                <input type="file" id="imageUpload" accept="image/*">

                <h3>Agregar Texto</h3>
                <input type="text" id="textInput" placeholder="Escribe tu frase...">
                <select id="fontSelect">
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Impact">Impact</option>
                </select>
                <button onclick="addText()">➕ Agregar Texto</button>

                <h3>Plantillas Decorativas</h3>
                <button onclick="addTemplate('heart')">❤️ Corazón</button>
                <button onclick="addTemplate('flower')">🌸 Flor</button>
                <button onclick="addTemplate('star')">⭐ Estrella</button>

                <h3>QR Code</h3>
                <input type="text" id="qrLink" placeholder="https://tuenlace.com">
                <button onclick="addQR()">📱 Generar QR</button>

                <hr>
                <button onclick="applyGrayscale()">🌫️ Convertir todo a Escala de Grises</button>
                <button onclick="deleteSelected()">🗑️ Borrar Seleccionado</button>
                <button onclick="clearCanvas()">🗑️ Limpiar Todo</button>
                <button onclick="exportDesign()" style="background:#28a745;">📥 Descargar Diseño (PNG)</button>
            </div>
        </div>
    </div>

    <script>
        let canvas = new fabric.Canvas('canvas', { preserveObjectStacking: true });
        let currentTab = 0; // 0 = Frente, 1 = Dorso

        // Mockups de ejemplo (cambia estas URLs por las tuyas cuando las subas)
        const mockups = {
            "medalla-redonda": "https://picsum.photos/id/1015/600/600",
            "medalla-ovalada": "https://picsum.photos/id/201/600/600",
            "mate-acero": "https://picsum.photos/id/180/600/600"
        };

        function loadMockup() {
            const product = document.getElementById('productSelect').value;
            fabric.Image.fromURL(mockups[product], img => {
                img.scaleToWidth(550);
                img.selectable = false;
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            });
        }

        // Subir imagen + convertir a gris
        document.getElementById('imageUpload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => {
                fabric.Image.fromURL(ev.target.result, img => {
                    img.filters.push(new fabric.Image.filters.Grayscale());
                    img.applyFilters();
                    img.scaleToWidth(200);
                    canvas.add(img);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function addText() {
            const textStr = document.getElementById('textInput').value || "Texto de ejemplo";
            const font = document.getElementById('fontSelect').value;
            const text = new fabric.Text(textStr, {
                left: 150, top: 200, fontSize: 28, fontFamily: font,
                fill: '#222', editable: true
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        async function addQR() {
            let url = document.getElementById('qrLink').value.trim();
            if (!url) return alert("Ingresa un enlace");
            if (!url.startsWith('http')) url = 'https://' + url;

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
            fabric.Image.fromURL(qrUrl, img => {
                img.scaleToWidth(140);
                canvas.add(img);
                canvas.setActiveObject(img);
            });
        }

        function addTemplate(type) {
            let url = '';
            if (type === 'heart') url = 'https://picsum.photos/id/1016/150/150';
            if (type === 'flower') url = 'https://picsum.photos/id/133/150/150';
            if (type === 'star') url = 'https://picsum.photos/id/201/150/150';

            fabric.Image.fromURL(url, img => {
                img.filters.push(new fabric.Image.filters.Grayscale());
                img.applyFilters();
                img.scaleToWidth(120);
                canvas.add(img);
                canvas.setActiveObject(img);
            });
        }

        function applyGrayscale() {
            canvas.getObjects().forEach(obj => {
                if (obj.type === 'image') {
                    obj.filters = [new fabric.Image.filters.Grayscale()];
                    obj.applyFilters();
                }
            });
            canvas.renderAll();
        }

        function deleteSelected() {
            const active = canvas.getActiveObject();
            if (active) canvas.remove(active);
        }

        function clearCanvas() {
            if (confirm("¿Borrar todo el diseño?")) canvas.clear();
        }

        function exportDesign() {
            const link = document.createElement('a');
            link.download = `grabado-${currentTab === 0 ? 'frente' : 'dorso'}.png`;
            link.href = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 2 });
            link.click();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === tab);
            });
            // Aquí más adelante guardaremos el estado de cada lado
            alert("Cambio a " + (tab === 0 ? "Frente" : "Dorso") + " - Próximamente guardaremos ambos diseños");
        }

        // Cargar mockup inicial
        window.onload = () => loadMockup();
    </script>
</body>
</html>
